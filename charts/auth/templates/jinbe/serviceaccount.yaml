{{- if and .Values.jinbe.enabled .Values.jinbe.serviceAccount.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  {{- with .Values.jinbe.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "auth.jinbe.labels" . | nindent 4 }}
  name: {{ include "auth.jinbe.serviceAccountName" . }}
{{ if .Values.jinbe.serviceAccount.token  }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  annotations:
    kubernetes.io/service-account.name: {{ include "auth.jinbe.serviceAccountName" . }}
  name: {{ printf "%s-token" (include "auth.jinbe.serviceAccountName" .) }}

{{- end }}
{{- end }}
