{{- if .Values.jinbe.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auth.jinbe.fullname" . }}
  labels:
    {{- include "auth.jinbe.labels" . | nindent 4 }}
  annotations:
    # Sync after the bootstrap Job (sync-wave 5). jinbe gates startup on the
    # bootstrap marker; running this Deployment first would deadlock the sync.
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: {{ .Values.jinbe.replicaCount }}
  selector:
    matchLabels:
      {{- include "auth.jinbe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auth.jinbe.labels" . | nindent 8 }}
      annotations:
        {{- include "auth.jinbe.podAnnotations" . | nindent 8 }}
    spec:
      {{- if and .Values.jinbe.enabled .Values.jinbe.serviceAccount.create }}
      serviceAccountName: {{ include "auth.jinbe.serviceAccountName" . }}
      {{- end }}
      {{- if .Values.jinbe.bootstrap.enabled }}
      initContainers:
        # Run the bootstrap CLI inline so the pod can't enter its main
        # container before Redis is seeded and Kratos has the default admin.
        # Idempotent (Redis marker rbac:bootstrap:state); subsequent restarts
        # exit 0 immediately. This makes `helm install` plug-and-play —
        # without the init container, jinbe's readiness gate on the marker
        # would deadlock the post-install bootstrap Job.
        - name: bootstrap
          image: "{{ .Values.jinbe.image.repository }}:{{ .Values.jinbe.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.jinbe.image.pullPolicy }}
          command: ["node", "dist/cli/bootstrap.js"]
          env:
            {{- include "auth.jinbe.env" . | nindent 12 }}
          {{- with .Values.jinbe.bootstrap.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: jinbe
          image: "{{ .Values.jinbe.image.repository }}:{{ .Values.jinbe.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.jinbe.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- include "auth.jinbe.env" . | nindent 12 }}
            {{- include "auth.jinbe.envRuntimeOnly" . | nindent 12 }}
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 72
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          {{- with .Values.jinbe.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
