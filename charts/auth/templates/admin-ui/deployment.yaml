{{- if .Values.adminUi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auth.fullname" . }}-admin-ui
  labels:
    app.kubernetes.io/component: admin-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.adminUi.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: admin-ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: admin-ui
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- with .Values.adminUi.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: admin-ui
          image: "{{ .Values.adminUi.image.repository }}:{{ .Values.adminUi.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.adminUi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.adminUi.containerPort | default 8080 }}
              protocol: TCP
          env:
            - name: API_BASE
              value: {{ .Values.adminUi.env.API_BASE | default "" | quote }}
            # AUTH_DOMAIN is substituted into kuma's index.html at container start
            # (envsubst → window.__AUTH_DOMAIN__). Drives the 401 redirect target.
            - name: AUTH_DOMAIN
              value: {{ .Values.adminUi.env.AUTH_DOMAIN | default (include "auth.authDomain" .) | quote }}
            {{- range $name, $value := .Values.adminUi.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- with .Values.adminUi.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
