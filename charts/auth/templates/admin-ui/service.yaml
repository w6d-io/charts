{{- if .Values.adminUi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "auth.fullname" . }}-admin-ui
  labels:
    app.kubernetes.io/component: admin-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.adminUi.service.type }}
  ports:
    - port: {{ .Values.adminUi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: admin-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
