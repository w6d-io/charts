# =============================================================================
# Plug-and-play overlay: dev.stradatms.net tenant
# =============================================================================
# helm template auth ./charts/auth -f examples/stradatms-values.yaml
# helm install   auth ./charts/auth -f examples/stradatms-values.yaml \
#   --namespace auth --create-namespace
#
# Hosts after deploy (point DNS at the ingress LB):
#   auth.dev.stradatms.net   — Kratos selfservice UI + APIs
#   kuma.dev.stradatms.net   — Admin RBAC dashboard
#   jinbe.dev.stradatms.net  — RBAC control plane API
#   dummy.dev.stradatms.net  — Sample protected upstream (bring your own)
# =============================================================================

global:
  domain: dev.stradatms.net

# All host-bearing URLs derive from {domain}. Override only when the
# chart's default {prefix}.{domain} convention does not fit.
kratos:
  kratos:
    config:
      serve:
        public:
          base_url: https://auth.dev.stradatms.net/
          cors:
            allowed_origins:
              - https://auth.dev.stradatms.net
              - https://kuma.dev.stradatms.net
              - https://jinbe.dev.stradatms.net
              - https://dummy.dev.stradatms.net
      session:
        cookie:
          domain: dev.stradatms.net   # parent — propagates to every subdomain
      selfservice:
        allowed_return_urls:
          - https://*.dev.stradatms.net
          - http://*.dev.stradatms.net
        default_browser_return_url: https://kuma.dev.stradatms.net
        flows:
          error:
            ui_url: https://auth.dev.stradatms.net/error
          login:
            ui_url: https://auth.dev.stradatms.net/login
          registration:
            ui_url: https://auth.dev.stradatms.net/register
          recovery:
            ui_url: https://auth.dev.stradatms.net/recovery
          verification:
            ui_url: https://auth.dev.stradatms.net/verification
          settings:
            ui_url: https://auth.dev.stradatms.net/settings
          logout:
            after:
              default_browser_return_url: https://auth.dev.stradatms.net/login

oathkeeper:
  ingress:
    proxy:
      enabled: true
      className: ing-strada
      # Override CORS allow-origin: the chart default of "*" is rejected
      # by browsers when the request carries credentials (cookies). List
      # the tenant origins explicitly; ingress-nginx echoes back the
      # one that matches the request's Origin header so credentialed
      # XHR/fetch from kuma → jinbe succeeds.
      annotations:
        nginx.ingress.kubernetes.io/cors-allow-origin: "https://kuma.dev.stradatms.net,https://auth.dev.stradatms.net,https://jinbe.dev.stradatms.net,https://dummy.dev.stradatms.net"
      hosts:
        - host: auth.dev.stradatms.net
          paths:
            - path: /
              pathType: ImplementationSpecific
        - host: kuma.dev.stradatms.net
          paths:
            - path: /
              pathType: ImplementationSpecific
        - host: jinbe.dev.stradatms.net
          paths:
            - path: /
              pathType: ImplementationSpecific
        - host: dummy.dev.stradatms.net
          paths:
            - path: /
              pathType: ImplementationSpecific

kratosLoginUi:
  kratos:
    browserUrl: https://auth.dev.stradatms.net
  redirects:
    defaultReturnUrl: https://kuma.dev.stradatms.net
    allowedReturnUrls: https://*.dev.stradatms.net
  branding:
    appName: StradaTMS

adminUi:
  env:
    API_BASE: https://jinbe.dev.stradatms.net/api
    AUTH_DOMAIN: auth.dev.stradatms.net

jinbe:
  env:
    # Tenant subdomain layout differs from the chart default (which uses
    # app.{domain} for both UI and API). Split the kuma frontend off to
    # kuma.{domain} and pin the jinbe REST API to jinbe.{domain}. Jinbe
    # seeds Oathkeeper access rules from these env vars, so they must
    # match the ingress hosts above.
    APP_DOMAIN: kuma.dev.stradatms.net
    API_DOMAIN: jinbe.dev.stradatms.net
    # Bootstrap a super-admin on first install so the dashboard is reachable
    # right away. The CLI is idempotent: ADMIN_PASSWORD is consumed once,
    # then the marker key rbac:bootstrap:state in Redis prevents re-runs.
    # Rotate the password via Kratos settings flow after first login;
    # in production replace these literals with Vault references.
    ADMIN_EMAIL: admin@dev.stradatms.net
    ADMIN_PASSWORD: changeme-stradatms-poc-2026
    ADMIN_NAME: StradaTMS Admin
    ENCRYPTION_KEY: changeme-32char-stradatms-poc-aaa
    CORS_ORIGIN: https://kuma.dev.stradatms.net,https://auth.dev.stradatms.net,https://jinbe.dev.stradatms.net,https://dummy.dev.stradatms.net
