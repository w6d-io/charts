apiVersion: v2
name: auth
description: Complete authentication stack with Kratos, Oathkeeper, OPAL, Jinbe, and Redis
type: application
version: 0.8.3
appVersion: "0.6.1"
keywords:
  - auth
  - kratos
  - oathkeeper
  - hydra
  - opal
  - opa
  - jinbe
  - redis
  - identity
  - authorization
home: https://github.com/w6d-io/charts
sources:
  - https://github.com/w6d-io/charts
maintainers:
  - name: WILDCARD
    url: https://w6d.io
icon: https://w6d.io/favicon.ico

dependencies:
  # Kratos - Identity Management
  - name: kratos
    version: "0.61.0"
    repository: https://k8s.ory.sh/helm/charts
    condition: kratos.enabled

  # Oathkeeper - API Gateway / Authorization Proxy
  - name: oathkeeper
    version: "0.61.0"
    repository: https://k8s.ory.sh/helm/charts
    condition: oathkeeper.enabled

  # Hydra - OAuth2 / OpenID Connect server (M2M client_credentials API keys)
  # Opt-in: disabled by default so existing consumers are unaffected.
  - name: hydra
    version: "0.62.1"
    repository: https://k8s.ory.sh/helm/charts
    condition: hydra.enabled

  # OPAL - Policy Administration (Server + Client + OPA)
  # Vendored for custom template modifications (podAnnotations for Vault)
  - name: opal
    version: "0.0.29"
    repository: "file://charts/opal"
    condition: opal.enabled

  # Redis - Data Store for Jinbe RBAC and OPAL broadcast
  - name: redis
    version: "~19"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
