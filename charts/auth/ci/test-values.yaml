# CI test values - disable components that need external dependencies
# Chart-testing (ct) automatically uses files in ci/ folder

# Jinbe disabled in CI — image is private (ECR). CI validates templates via helm lint.
jinbe:
  enabled: false

# Use official Redis 7 in CI (Redis 8/Bitnami needs io_uring, blocked by Kind seccomp)
redis:
  enabled: true
  architecture: standalone
  image:
    registry: docker.io
    repository: redis
    tag: "7-alpine"
  auth:
    enabled: false
  master:
    command: ["redis-server"]
    args: ["--port", "6379", "--bind", "0.0.0.0", "--save", ""]
    persistence:
      enabled: false
    customLivenessProbe:
      exec:
        command: ["redis-cli", "ping"]
      initialDelaySeconds: 5
      periodSeconds: 5
    customReadinessProbe:
      exec:
        command: ["redis-cli", "ping"]
      initialDelaySeconds: 5
      periodSeconds: 5

opal:
  enabled: false  # Skip in CI

opaAuthzProxy:
  enabled: false  # Skip in CI

kratosLoginUi:
  enabled: false  # Skip in CI

# Disable kratos (needs DB + automigrate hook fails without DB)
kratos:
  enabled: false

# Disable oathkeeper (depends on kratos)
oathkeeper:
  enabled: false
