# CI test values - disable components that need external dependencies
# Chart-testing (ct) automatically uses files in ci/ folder

jinbe:
  enabled: true
  image:
    repository: ghcr.io/w6d-io/jinbe-api
    tag: latest
  env:
    ENCRYPTION_KEY: test-encryption-key-minimum-32-characters
    NODE_ENV: test
    DEV_BYPASS_AUTH: "true"

redis:
  enabled: true
  architecture: standalone
  image:
    registry: ""
    repository: ghcr.io/w6d-io/redis
    tag: 8.2.2
  auth:
    enabled: false
  global:
    security:
      allowInsecureImages: true
  master:
    podSecurityContext:
      seccompProfile:
        type: Unconfined
    containerSecurityContext:
      seccompProfile:
        type: Unconfined
    persistence:
      enabled: false

opal:
  enabled: false  # Skip in CI

opaAuthzProxy:
  enabled: false  # Skip in CI

kratosLoginUi:
  enabled: false  # Skip in CI

# Disable kratos (needs DB + automigrate hook fails without DB)
kratos:
  enabled: false

# Disable oathkeeper (depends on kratos)
oathkeeper:
  enabled: false
