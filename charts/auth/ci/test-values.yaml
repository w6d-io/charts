# CI test values - disable components that need external dependencies
# Chart-testing (ct) automatically uses files in ci/ folder

# Jinbe disabled in CI — image is private (ECR). CI validates templates via helm lint.
jinbe:
  enabled: false

redis:
  enabled: true
  architecture: standalone
  image:
    registry: ghcr.io
    repository: w6d-io/redis
    tag: 8.2.2
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

opal:
  enabled: false  # Skip in CI

opaAuthzProxy:
  enabled: false  # Skip in CI

kratosLoginUi:
  enabled: false  # Skip in CI

# Disable kratos (needs DB + automigrate hook fails without DB)
kratos:
  enabled: false

# Disable oathkeeper (depends on kratos)
oathkeeper:
  enabled: false
