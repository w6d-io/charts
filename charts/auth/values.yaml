# =============================================================================
# Auth Stack - Complete Authentication & Authorization Helm Chart
# =============================================================================

# =============================================================================
# Global Configuration
# =============================================================================
global:
  # Base domain - all URLs are derived from this
  domain: example.com
  # Override if auth domain differs from auth.<domain>
  # authDomain: auth.example.com
  # Override if app domain differs from app.<domain>
  # appDomain: app.example.com
  imagePullSecrets: []

  # Vault configuration (Banzai Cloud) - annotations auto-injected when enabled
  vault:
    enabled: false
    address: http://vault.vault:8200
    role: ""
    envFromPath: ""

nameOverride: ""
fullnameOverride: ""

# =============================================================================
# Kratos - Identity Management (Ory)
# =============================================================================
kratos:
  enabled: true

  # ServiceAccount is created by auth chart (templates/kratos/serviceaccount.yaml)
  # with automountServiceAccountToken: true for Vault integration
  deployment:
    serviceAccount:
      create: false  # Disabled - SA created by parent chart with automount enabled
      name: kratos
      annotations: {}
    automountServiceAccountToken: true

  ingress:
    public:
      enabled: false  # Traffic routed through Oathkeeper

  kratos:
    automountServiceAccountToken: true
    config:
      # ─── Database (DSN) ───────────────────────────────────────────────────
      # The chart bundles a simple postgresql StatefulSet (postgresqlSimple)
      # whose Service is `<release>-postgresql:5432`. The default DSN below
      # assumes you install with `helm install auth ./auth`, producing service
      # `auth-postgresql`. Override `kratos.kratos.config.dsn` if your release
      # name differs OR you point at an external DB.
      #
      # Plug-and-play options:
      #   - Bundled simple postgres (default):
      #       dsn: postgresql://kratos:kratos@auth-postgresql:5432/kratos?sslmode=disable
      #
      #   - SQLite (single-instance, dev or low-traffic; data persists in PVC):
      #       dsn: sqlite:///var/lib/kratos/kratos.sqlite?_fk=true&mode=rwc
      #     (also disable postgresqlSimple, mount a PVC at /var/lib/kratos
      #      via kratos.deployment.extraVolumes/extraVolumeMounts)
      #     Reference: https://www.ory.sh/docs/hydra/self-hosted/dependencies-environment#sqlite
      #
      #   - External Postgres / RDS / Cloud SQL:
      #       dsn: postgresql://USER:PASS@HOST:5432/DB?sslmode=require
      #
      #   - In-memory (state lost on pod restart — testing only):
      #       dsn: memory
      dsn: postgresql://kratos:kratos@auth-postgresql:5432/kratos?sslmode=disable

      # ─── Cryptographic secrets ────────────────────────────────────────────
      # Ory schema constraints:
      #   default[*]  — min 16 chars
      #   cookie[*]   — min 16 chars (used to sign session cookies)
      #   cipher[*]   — exactly 32 chars (XChaCha20-Poly1305 key)
      # PROD: rotate via vault and pass via Vault sidecar / external secrets.
      # Examples below are deterministic placeholders, NOT for production use.
      secrets:
        default:
          - changeme-default-secret-16chars
        cookie:
          - changeme-cookie-secret-16chars0
        cipher:
          - changeme-this-cipher-secret-32cc
      identity:
        default_schema_id: default
        schemas:
          - id: default
            url: file:///etc/config/person.schema.json
      serve:
        public:
          base_url: https://auth.example.com/
          cors:
            enabled: true
            allowed_origins:
              - https://auth.example.com
              - https://app.example.com
      session:
        cookie:
          domain: example.com
          same_site: Lax
          persistent: true
      selfservice:
        allowed_return_urls:
          - https://app.example.com
        default_browser_return_url: https://app.example.com
        methods:
          password:
            enabled: true
          oidc:
            enabled: false
            config:
              providers: []
        flows:
          error:
            ui_url: https://auth.example.com/auth/error
          settings:
            ui_url: https://auth.example.com/auth/settings
            privileged_session_max_age: 15m
          recovery:
            enabled: true
          verification:
            enabled: true
          logout:
            after:
              default_browser_return_url: https://auth.example.com/auth/login
          login:
            ui_url: https://auth.example.com/auth/login
            lifespan: 10m
          registration:
            lifespan: 10m
            ui_url: https://auth.example.com/auth/registration
      log:
        level: info
        format: json
      ciphers:
        algorithm: xchacha20-poly1305
      hashers:
        argon2:
          parallelism: 1
          memory: 128MB
          iterations: 2
          salt_length: 16
          key_length: 16
    # ─── Database migration ───────────────────────────────────────────────
    # initContainer runs migration inside the Kratos pod before the main
    # container starts, so it waits for Postgres readiness through normal
    # Pod lifecycle. The alternative (`type: job`) creates a Helm pre-install
    # hook that runs BEFORE chart resources, deadlocking fresh installs that
    # bundle their own postgres (hook waits for DB, DB hasn't been deployed
    # yet). InitContainer is idempotent and safe for already-migrated DBs.
    automigration:
      enabled: true
      type: initContainer

    # Example identity schemas - customize for your use case
    identitySchemas:
      person.schema.json: |
        {
          "$id": "https://schemas.example.com/person.schema.json",
          "$schema": "http://json-schema.org/draft-07/schema#",
          "title": "Person",
          "type": "object",
          "properties": {
            "traits": {
              "type": "object",
              "properties": {
                "email": {
                  "type": "string",
                  "format": "email",
                  "title": "Email",
                  "ory.sh/kratos": {
                    "credentials": { "password": { "identifier": true } },
                    "verification": { "via": "email" },
                    "recovery": { "via": "email" }
                  }
                },
                "name": { "type": "string", "title": "Name" }
              },
              "required": ["email"],
              "additionalProperties": false
            }
          }
        }

# =============================================================================
# Oathkeeper - API Gateway (Ory)
# =============================================================================
# helmTemplatedConfigEnabled allows {{ .Release.Name }} in oathkeeper.config.
# The tpl runs in the SUBCHART context, so only .Release.Name/.Namespace are
# available -- parent-chart includes and .Values are NOT accessible.
# Oathkeeper's own Go template syntax ({{ .Subject }}, etc.) is escaped with
# {{ "{{" }} ... {{ "}}" }} to survive the tpl pass.
oathkeeper:
  enabled: true

  oathkeeper:
    helmTemplatedConfigEnabled: true
    config:
      access_rules:
        matching_strategy: regexp
        repositories:
          - 'http://{{ .Release.Name }}-jinbe:8080/api/oathkeeper/rules'
      authenticators:
        cookie_session:
          enabled: true
          config:
            check_session_url: 'http://{{ .Release.Name }}-kratos-public:80/sessions/whoami'
            preserve_path: true
            extra_from: "@this"
            subject_from: "identity.id"
            only:
              - ory_kratos_session
        noop:
          enabled: true
      authorizers:
        allow:
          enabled: true
        remote_json:
          enabled: true
          config:
            remote: 'http://{{ .Release.Name }}-opa-authz-proxy:8080/v1/data/rbac/allow'
            payload: |
              {
                "input": {
                  "sub": "{{ "{{" }} print .Subject {{ "}}" }}",
                  "email": "{{ "{{" }} index .Extra.identity.traits "email" {{ "}}" }}",
                  "object": "{{ "{{" }} .MatchContext.URL.Path {{ "}}" }}",
                  "action": "{{ "{{" }} .MatchContext.Method {{ "}}" }}"
                }
              }
      mutators:
        noop:
          enabled: true
        header:
          enabled: true
          config:
            # Oathkeeper runtime templates — escaped so helm's tpl pass leaves
            # them intact for oathkeeper to evaluate per-request. The email
            # template is nil-safe so requests reaching this rule via the
            # noop fallback authenticator (no session) don't crash.
            headers:
              x-user-id: '{{ "{{" }} print .Subject {{ "}}" }}'
              x-user-email: '{{ "{{" }} if .Extra.identity {{ "}}" }}{{ "{{" }} index .Extra.identity.traits "email" {{ "}}" }}{{ "{{" }} end {{ "}}" }}'
      errors:
        fallback: [redirect, json]
        handlers:
          redirect:
            enabled: true
            config:
              to: https://auth.example.com/auth/login?return_to=https://app.example.com/
              when:
                - error: [unauthorized, forbidden]
                  request:
                    header:
                      accept: [text/html]
          json:
            enabled: true
            config:
              verbose: false

  ingress:
    proxy:
      enabled: true
      className: ""
      annotations: {}
      hosts:
        - host: auth.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
        - host: app.example.com
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls: []

  # Access rules - now served by Jinbe HTTP endpoint
  # If you still need a static ConfigMap fallback, provide inline JSON here
  # externalAccessRulesConfigMap: "my-access-rules-configmap"
  accessRules: ""

# =============================================================================
# OPAL - Policy Administration (Permit.io)
# =============================================================================
opal:
  enabled: true

  server:
    port: 7002
    policyRepoUrl: "https://github.com/w6d-io/policies.git"  # Default W6D RBAC policy
    policyRepoMainBranch: "main"
    pollingInterval: 30
    broadcastPgsql: false
    broadcastUri: ""  # Required only when uvicornWorkers > 1 — redis://<release>-redis-master:6379
    # Single worker → no need for inter-worker broadcast bus.
    # Increase + set broadcastUri when scaling.
    uvicornWorkers: 1
    replicas: 1
    # OPAL fetches RBAC data from Jinbe (external data source)
    dataConfigSources:
      external_source_url: ""  # Auto: http://{release}-auth-jinbe:8080/api/admin/rbac/opal-datasource
      # Override in environment-specific values with actual Jinbe URL

  client:
    port: 7000
    opaPort: 8181
    replicas: 1
    # NOTE: Must be overridden per-release since OPAL subchart doesn't support tpl
    # Use: --set opal.client.serverUrl=http://{release}-opal-server:7002
    serverUrl: ""  # Auto-computed by OPAL subchart if empty

# =============================================================================
# Jinbe - RBAC API & OPA Bundle Server
# =============================================================================
jinbe:
  enabled: true
  replicaCount: 1

  serviceAccount:
    create: true
    name: ""
    token: false
  # Jinbe image — REQUIRED override unless your cluster has a pull secret for
  # the W6D registry. The default below is private; a public release (e.g.
  # ghcr.io/w6d-io/jinbe:vX.Y.Z) will be wired in once published.
  # Override examples:
  #   --set jinbe.image.repository=<your-registry>/jinbe
  #   --set jinbe.image.tag=latest
  image:
    repository: ghcr.io/w6d-io/jinbe
    tag: ""              # empty → falls back to .Chart.AppVersion
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  # Environment variables for Jinbe
  # Service URLs default to release-prefixed Kubernetes service names
  env:
    NODE_ENV: production
    APP_NAME: jinbe
    ENCRYPTION_KEY: ""  # REQUIRED - set in environment-specific values or Vault
    # REDIS_URL: auto-computed as redis://<release>-redis-master:6379
    # KRATOS_PUBLIC_URL: auto-computed as http://<release>-kratos-public:80
    # KRATOS_ADMIN_URL: auto-computed as http://<release>-kratos-admin:80
    # OPA_URL: auto-computed as http://<release>-opal-client:8181
    # OPAL_SERVER_URL: auto-computed as http://<release>-opal-server:7002
    # JINBE_INTERNAL_URL: auto-computed as http://<release>-jinbe:8080
    # OPA_DATA_URL: auto-computed as http://<release>-opal-client:8181
    # CORS_ORIGIN: auto-computed from global.appDomain and global.authDomain
    # ENABLE_SWAGGER: "false"
    # LOG_LEVEL: info
    # DATABASE_URL: set if Jinbe needs a database
    # ADMIN_EMAIL: auto-created on first boot with super_admin access
    # ADMIN_PASSWORD: password for default admin (default: changeme123!)
    # ADMIN_NAME: display name for default admin

  # Additional environment variables (map format: NAME: value)
  extraEnv: {}

  # Pod annotations (e.g., for Vault integration)
  podAnnotations: {}

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # NetworkPolicy — restrict who can reach jinbe Service. Defence in depth:
  # jinbe authenticates exclusively via Kratos session cookie now (the proxy-
  # header fallback was removed), but limiting peer connectivity prevents
  # rogue/compromised pods in the namespace from hitting admin endpoints
  # without first going through oathkeeper. Allowed peers by default:
  # oathkeeper, opal-server, opal-client, admin-ui (when enabled).
  # Set `enabled: false` if your CNI doesn't support NetworkPolicy.
  networkPolicy:
    enabled: true
    # extraIngress: list of NetworkPolicyPeer entries appended to the rule
    # (e.g. additional namespaceSelector / podSelector). Yaml-merge friendly.
    extraIngress: []

  # Bootstrap Job — runs `node dist/cli/bootstrap.js` as a Helm post-install /
  # post-upgrade hook. Idempotent: skipped via Redis marker on subsequent runs.
  # The Job uses the same image, ServiceAccount, and Vault podAnnotations as
  # the API Deployment.
  bootstrap:
    enabled: true
    activeDeadlineSeconds: 600
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# =============================================================================
# Redis - Data Store (Bitnami)
# =============================================================================
redis:
  enabled: true
  architecture: standalone
  image:
    registry: ghcr.io
    repository: w6d-io/redis
    tag: "8.2.2"
  auth:
    enabled: false
  master:
    persistence:
      size: 1Gi

# =============================================================================
# OPA AuthZ Proxy - Translates OPA decisions into HTTP status codes
# =============================================================================
opaAuthzProxy:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/w6d-io/infra/opa-authz-proxy
    tag: "v0.1.0"
    pullPolicy: IfNotPresent

  # Auto-computed from opal client service if empty
  opaUpstreamUrl: ""

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

# =============================================================================
# Kratos Login UI
# =============================================================================
kratosLoginUi:
  # Disabled by default — the image is not published to a public registry.
  # To enable, set `kratosLoginUi.enabled: true` and provide a working image
  # repository (W6D internal: 095...ecr.../infra/frontend/kratos-login-ui/w6d).
  # The Oathkeeper rule `selfservice-ui` upstream points at this Service —
  # auth/registration UI flows require this enabled.
  enabled: false
  replicaCount: 1

  image:
    repository: ghcr.io/w6d-io/kratos-login-ui
    pullPolicy: IfNotPresent
    tag: "0.1.0-alpha.35"

  branding:
    appName: "My App"
    logoUrl: "/logo.svg"
    faviconUrl: "/favicon.ico"

  theme:
    primaryColor: "3B82F6"
    darkMode: true
    backgroundColor: "111827"

  kratos:
    browserUrl: "https://auth.example.com"
    publicUrl: ""  # Auto: http://<release>-kratos-public:80

  redirects:
    defaultReturnUrl: "https://app.example.com"
    allowedReturnUrls: "https://*.example.com"

  texts:
    loginTitle: "Welcome back"
    loginSubtitle: "Sign in to your account"
    registerTitle: "Create account"
    registerSubtitle: "Get started with your account"
    recoveryTitle: "Reset password"
    recoverySubtitle: "Enter your email to reset your password"

  footer:
    text: ""
    links: []

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5

  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# PostgreSQL Simple - Lightweight Postgres (official image, no Bitnami)
# =============================================================================
# Use this when Bitnami images can't be pulled. Mutually exclusive with postgresql.
postgresqlSimple:
  enabled: true  # Set to false if using Bitnami postgresql or external DB
  image:
    repository: postgres
    tag: "16"
  auth:
    username: kratos
    password: kratos
    database: kratos
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# Admin UI (Kuma) - RBAC Management Dashboard
# =============================================================================
adminUi:
  enabled: false  # Enable to deploy the admin dashboard
  replicaCount: 1
  image:
    repository: ""  # Set your admin UI image
    tag: ""
    pullPolicy: IfNotPresent
  env:
    NEXT_PUBLIC_API_URL: ""  # Auto: https://app.{domain}
    NEXT_PUBLIC_AUTH_URL: ""  # Auto: https://auth.{domain}
  extraEnv: {}
  podAnnotations: {}
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ─── Scheduled Backup ──────────────────────────────────────────────────────────
# Exports all RBAC config + identities as a JSON bundle and uploads to S3.
# Requires an IAM role with s3:PutObject on the target bucket.
# Use backup.serviceAccount.annotations to attach an IRSA role.
backup:
  enabled: false
  schedule: "0 2 * * *"        # Daily at 02:00 UTC
  image: ""                     # Default: public.ecr.aws/aws-cli/aws-cli:latest
  imagePullSecrets: []

  s3:
    bucket: ""                  # Required when enabled=true
    prefix: "auth-backup"
    region: "eu-west-3"

  # Internal Host header sent to Jinbe for auth bypass.
  # Auto-computed as <release>-jinbe:8080 — only override if Jinbe runs in a different namespace.
  internalHostHeader: ""

  # For IRSA (EKS pod-level IAM) annotate the ServiceAccount:
  # serviceAccount.annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/auth-backup-role
  serviceAccount:
    annotations: {}
